<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل | منصة دروسي العراقية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4338ca;
            --primary-light: #6366f1;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f4ff;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .offline-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: var(--primary);
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .retry-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 12px;
        }
        .retry-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>عذراً، لا يوجد اتصال</h1>
        <p>يبدو أنك غير متصل بالإنترنت حالياً. يرجى التحقق من الشبكة وإعادة المحاولة للوصول إلى كافة الدروس.</p>
        
        <button class="retry-btn" onclick="window.location.reload()">
            إعادة محاولة الاتصال
        </button>

        <div class="status-badge">
            <span class="dot"></span>
            أنت في وضع الأوفلاين حالياً
        </div>
    </div>

    <script>
        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
